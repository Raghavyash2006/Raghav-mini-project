version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./localization.db
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    command: ['npm', 'run', 'dev', '--', '--host', '0.0.0.0']
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE=http://localhost:8000/v1
